<!DOCTYPE html>
<html>
<head>
    <title>Вхід - E-SHOP</title>
    <link type="text/css" rel="stylesheet" href="/static/css/bootstrap.min.css" />
</head>
<body style="background-color: #f8f9fa; padding-top: 50px;">
    <div class="container text-center" style="max-width: 400px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1);">
        <h2>Вхід в акаунт</h2>
        <form method="post" style="margin-top: 20px;">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-danger btn-block">Увійти</button>
        </form>
        <p style="margin-top: 15px;">Ще немає акаунта? <a href="{% url 'register' %}">Зареєструватися</a></p>
        <a href="{% url 'index' %}">⬅ Повернутися в магазин</a>
    </div>
</body>
</html>
